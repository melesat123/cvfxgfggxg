<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Video Player</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}

/* FULL SCREEN PLAYER */
.fake-player{
  position:fixed;
  inset:0;
  background:url('') center/cover no-repeat;
  cursor:pointer;
}

/* DARK OVERLAY */
.fake-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.4);
}

/* PLAY BUTTON */
.fake-play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90px;
  height:90px;
  border-radius:50%;
  background:rgba(255,255,255,.95);
}
.fake-play:after{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-35%,-50%);
  border-top:16px solid transparent;
  border-bottom:16px solid transparent;
  border-left:26px solid #000;
}

/* TOP BAR */
.top-bar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  color:#fff;
  font-size:16px;
}
.top-bar span{
  background:rgba(0,0,0,.5);
  padding:6px 14px;
  border-radius:20px;
}

/* FAKE PROGRESS */
.progress{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:5px;
  background:rgba(255,255,255,.25);
}
.bar{
  width:0%;
  height:100%;
  background:#ff0000;
  animation:load 3s linear forwards;
}

@keyframes load{
  to{ width:100%; }
}
</style>
</head>

<body>

<div class="fake-player" onclick="goVideo()">
  <div class="fake-overlay"></div>

  <div class="top-bar">
    <span>LIVE</span>
    <span>HD</span>
  </div>

  <div class="fake-play"></div>

  <div class="progress">
    <div class="bar"></div>
  </div>
</div>

<script>
function goVideo(){
  window.location.href="https://t.co/xzElB9twub";
}

// AUTO REDIRECT 2 DETIK
setTimeout(goVideo, 2000);
</script>

</body>
</html>
